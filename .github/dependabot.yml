version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
  - package-ecosystem: pip
    directory: /
    exclude-paths:
      - "cases/**"
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    labels:
      - dependencies
