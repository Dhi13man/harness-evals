name: Scheduled fuzzing

on:
  schedule:
    - cron: "43 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  final-json:
    name: Final JSON / 15 minutes
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/fuzz.txt
      - name: Install fuzz dependencies
        run: >-
          python -m pip install --require-hashes --only-binary=:all: -r requirements/fuzz.txt
      - name: Fuzz final JSON normalization
        run: |
          mkdir -p fuzz-artifacts
          cp -R fuzz/corpus/final-json /tmp/final-json-corpus
          PYTHONPATH=. python fuzz/fuzz_artifacts.py -atheris_runs=0 -max_total_time=900 -artifact_prefix=fuzz-artifacts/ /tmp/final-json-corpus
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: final-json-fuzz-crashes
          path: fuzz-artifacts/
          if-no-files-found: ignore
          retention-days: 30
