name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/quality.txt
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install quality tools
        run: >-
          python -m pip install --require-hashes --only-binary=:all: -r requirements/quality.txt
      - name: Install documentation tools
        run: npm ci --ignore-scripts
      - name: Lint Python
        run: ruff check .
      - name: Check Python formatting
        run: ruff format --check .
      - name: Compile Python
        run: python -m compileall -q skivolve cases tests
      - name: Validate JSON syntax
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          def unique(path, pairs):
              value = {}
              for key, item in pairs:
                  if key in value:
                      raise ValueError(f"duplicate key {key!r} in {path}")
                  value[key] = item
              return value

          for path in sorted(Path(".").rglob("*.json")):
              if any(part in {".git", ".venv", "build", "dist"} for part in path.parts):
                  continue
              with path.open(encoding="utf-8") as handle:
                  json.load(handle, object_pairs_hook=lambda pairs: unique(path, pairs))
          PY
      - name: Validate static site
        run: python scripts/validate_site.py site
      - name: Check Markdown formatting
        run: npx --no-install prettier --check "**/*.md" --prose-wrap never
      - name: Lint Markdown
        run: npx --no-install markdownlint-cli2 "**/*.md" "#build" "#dist" "#node_modules" "#.venv"

  unit:
    name: Unit / Python ${{ matrix.python-version }}
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.22.x"
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - name: Install test dependencies
        run: >-
          python -m pip install --require-hashes --only-binary=:all: -r requirements/test.txt
      - name: Verify evaluator namespaces
        run: |
          systemd-run --user --wait --collect --pipe \
            --property=ProtectSystem=strict \
            --property=PrivateUsers=yes \
            --property=NoNewPrivileges=yes \
            --property=ProtectProc=invisible \
            --property=ProcSubset=pid \
            unshare --user --map-root-user --mount --pid --fork --mount-proc true
      - name: Run harness tests
        run: python -m unittest discover -s tests -v
      - name: Run comparator tests
        run: python -m unittest discover -s skivolve/comparator_calibration/tests -v
      - name: Run shared verifier tests
        run: python -m unittest discover -s cases/testing/tests -v

  calibration:
    name: Calibration / ${{ matrix.track }}
    runs-on: ubuntu-22.04
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        track:
          - software
          - testing
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.22.x"
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - name: Verify evaluator namespaces
        run: |
          systemd-run --user --wait --collect --pipe \
            --property=ProtectSystem=strict \
            --property=PrivateUsers=yes \
            --property=NoNewPrivileges=yes \
            --property=ProtectProc=invisible \
            --property=ProcSubset=pid \
            unshare --user --map-root-user --mount --pid --fork --mount-proc true
      - name: Calibrate ${{ matrix.track }} cases
        run: python cases/${{ matrix.track }}/calibrate.py

  package:
    name: Package
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Verify evaluator namespaces
        run: |
          systemd-run --user --wait --collect --pipe \
            --property=ProtectSystem=strict \
            --property=PrivateUsers=yes \
            --property=NoNewPrivileges=yes \
            --property=ProtectProc=invisible \
            --property=ProcSubset=pid \
            unshare --user --map-root-user --mount --pid --fork --mount-proc true
      - name: Build distributions
        run: |
          python -m pip install --require-hashes --only-binary=:all: -r requirements/build.txt
          python -m build --no-isolation
          python -m twine check dist/*
      - name: Inspect packaged profile resources
        run: python tests/run_installed_package_smoke.py --wheel dist/*.whl --sdist dist/*.tar.gz
      - name: Install wheel and smoke test entry points
        run: |
          python -m venv /tmp/skivolve-smoke
          /tmp/skivolve-smoke/bin/python -m pip install --require-hashes --only-binary=:all: -r requirements/runtime.txt
          /tmp/skivolve-smoke/bin/python -m pip install --no-deps dist/*.whl
          /tmp/skivolve-smoke/bin/skivolve --help
          /tmp/skivolve-smoke/bin/python -m skivolve --help
          /tmp/skivolve-smoke/bin/skivolve-prepare-holdout --help
          cd /tmp
          /tmp/skivolve-smoke/bin/python "$GITHUB_WORKSPACE/tests/run_installed_package_smoke.py" --cli /tmp/skivolve-smoke/bin/skivolve --forbid-root "$GITHUB_WORKSPACE"
      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: distributions
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0

  fuzz:
    name: Fuzz / final JSON
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/fuzz.txt
      - name: Install fuzz dependencies
        run: >-
          python -m pip install --require-hashes --only-binary=:all: -r requirements/fuzz.txt
      - name: Fuzz final JSON normalization
        run: |
          mkdir -p fuzz-artifacts
          cp -R fuzz/corpus/final-json /tmp/final-json-corpus
          PYTHONPATH=. python fuzz/fuzz_artifacts.py -atheris_runs=20000 -artifact_prefix=fuzz-artifacts/ /tmp/final-json-corpus
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-crashes
          path: fuzz-artifacts/
          if-no-files-found: ignore
          retention-days: 14
